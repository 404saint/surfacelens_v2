<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SurfaceLens V2 // Command Center</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #00f2ff;
            --text: #e0e6ed;
            --low: #22c55e;
            --medium: #eab308;
            --high: #ef4444;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 40px; 
        }

        h1 { 
            color: var(--primary); 
            letter-spacing: 2px; 
            text-transform: uppercase;
            font-size: 1.5rem;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
            margin-bottom: 30px;
        }

        .stats-container {
            display: flex; gap: 20px; margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px; border-radius: 8px;
            flex: 1; border: 1px solid #2d2d35;
        }

        table { 
            width: 100%; border-collapse: separate; border-spacing: 0 8px; 
        }

        th { 
            text-align: left; padding: 15px; color: #888; text-transform: uppercase; font-size: 0.8rem;
        }

        td { 
            background: var(--surface); padding: 15px; 
            border-top: 1px solid #2d2d35; border-bottom: 1px solid #2d2d35;
        }

        td:first-child { border-left: 1px solid #2d2d35; border-radius: 8px 0 0 8px; }
        td:last-child { border-right: 1px solid #2d2d35; border-radius: 0 8px 8px 0; }

        .badge {
            padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;
        }
        .bg-low { background: rgba(34, 197, 94, 0.1); color: var(--low); }
        .bg-medium { background: rgba(234, 179, 8, 0.1); color: var(--medium); }
        .bg-high { background: rgba(239, 68, 68, 0.1); color: var(--high); }

        .timestamp { color: #666; font-family: monospace; font-size: 0.85rem; }
    </style>
</head>
<body>
    <h1>SurfaceLens V2 // Intelligence Inventory</h1>

    <div class="stats-container">
        <div class="stat-card">
            <div style="color: #888; font-size: 0.8rem;">Total Assets</div>
            <div style="font-size: 1.8rem; font-weight: bold;">{{ assets|length }}</div>
        </div>
        <div class="stat-card">
            <div style="color: #888; font-size: 0.8rem;">Active Sessions</div>
            <div style="font-size: 1.8rem; font-weight: bold; color: var(--primary);">Live</div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Asset Identity</th>
                <th>IP Address</th>
                <th>Port</th>
                <th>Service</th>
                <th>Last Seen</th>
            </tr>
        </thead>
        <tbody>
            {% for asset in assets %}
            <tr>
                <td style="font-weight: bold;">{{ asset.id }}</td>
                <td>{{ asset.ip }}</td>
                <td><span class="badge bg-medium">{{ asset.port }}</span></td>
                <td><code>{{ asset.service }}</code></td>
                <td class="timestamp">{{ asset.last_seen.split('.')[0] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
